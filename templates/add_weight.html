{% extends "base.html" %}
{% block content %}
<h2>Log Weight</h2>
<form method="POST">
    <label for="weight">Weight (kg/lbs):</label>
    <input type="number" step="0.1" name="weight" required>

    <label for="date">Date:</label>
    <input type="date" name="date" value="{{ today_date }}" required>

    <button type="submit">Save Weight</button>
</form>
{% endblock %}
